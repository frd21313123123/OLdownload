<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>OLdownload</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23171717'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-family='Arial' font-size='22' font-weight='700' fill='white'%3EOL%3C/text%3E%3C/svg%3E" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ee;
        --panel: #ffffff;
        --ink: #171717;
        --muted: #61666f;
        --line: #d9d6cf;
        --accent: #126c5b;
        --accent-strong: #0e5648;
        --danger: #9d2b22;
        --soft: #eef6f3;
        --shadow: 0 18px 55px rgba(38, 34, 27, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Arial, Helvetica, sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 34px 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 22px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 800;
        font-size: 22px;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        color: #fff;
        background: var(--ink);
        border-radius: 8px;
        font-size: 17px;
      }

      .hint {
        color: var(--muted);
        font-size: 14px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .search-panel {
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(30px, 4vw, 52px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      .sub {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }

      .input-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
      }

      input {
        width: 100%;
        min-width: 0;
        height: 48px;
        border: 1px solid #bfc3c7;
        border-radius: 6px;
        padding: 0 14px;
        font-size: 15px;
        color: var(--ink);
        background: #fff;
      }

      input:focus {
        outline: 3px solid rgba(18, 108, 91, 0.18);
        border-color: var(--accent);
      }

      button,
      .download-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 0 16px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
      }

      button:active,
      .download-link:active {
        transform: translateY(1px);
      }

      .primary {
        color: #fff;
        background: var(--accent);
      }

      .primary:hover {
        background: var(--accent-strong);
      }

      .primary:disabled {
        cursor: wait;
        background: #8aa79f;
      }

      .download-link {
        color: #fff;
        background: #1f4f9a;
        white-space: nowrap;
      }

      .status {
        min-height: 20px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 14px;
      }

      .status.error {
        color: var(--danger);
      }

      .preview {
        overflow: hidden;
      }

      .thumb {
        display: grid;
        place-items: center;
        aspect-ratio: 16 / 9;
        background: #202124;
        color: #e9ecef;
      }

      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .preview-body {
        padding: 18px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .video-title {
        margin: 0;
        font-size: 20px;
        line-height: 1.3;
      }

      .meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .pill {
        padding: 5px 9px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        background: #fbfaf7;
      }

      .results {
        grid-column: 1 / -1;
        padding: 0;
        overflow: hidden;
      }

      .results-head {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }

      .results-head h2 {
        margin: 0;
        font-size: 18px;
      }

      .results-head span {
        color: var(--muted);
        font-size: 14px;
      }

      .format-list {
        display: grid;
      }

      .format-row {
        display: grid;
        grid-template-columns: minmax(120px, 1fr) minmax(90px, 0.7fr) minmax(90px, 0.7fr) auto;
        gap: 12px;
        align-items: center;
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
      }

      .format-row:last-child {
        border-bottom: 0;
      }

      .quality {
        font-weight: 800;
      }

      .muted {
        color: var(--muted);
        font-size: 14px;
      }

      .empty {
        padding: 22px 20px;
        color: var(--muted);
        line-height: 1.5;
      }

      [hidden] {
        display: none !important;
      }

      @media (max-width: 820px) {
        main {
          width: min(100% - 20px, 680px);
          padding: 18px 0;
        }

        .topbar,
        .workspace,
        .input-row {
          display: grid;
          grid-template-columns: 1fr;
        }

        .format-row {
          grid-template-columns: 1fr;
          gap: 8px;
        }

        .download-link {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">OL</span>
          <span>OLdownload</span>
        </div>
        <div class="hint">Прямое скачивание без сохранения файла на сервере</div>
      </header>

      <section class="workspace">
        <div class="panel search-panel">
          <h1>Скачать видео по ссылке</h1>
          <p class="sub">Вставьте ссылку, выберите доступное качество и начните скачивание в браузере.</p>
          <div class="input-row">
            <input id="url" type="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" />
            <button id="analyzeBtn" class="primary">Найти варианты</button>
          </div>
          <div id="status" class="status"></div>
        </div>

        <aside id="preview" class="panel preview">
          <div class="thumb" id="thumb">Вставьте ссылку</div>
          <div class="preview-body">
            <p class="eyebrow" id="previewState">Ожидание ссылки</p>
            <h2 id="videoTitle" class="video-title">Выберите доступный готовый файл</h2>
            <div id="meta" class="meta">
              <span class="pill">MP4/WebM</span>
              <span class="pill">Без файла на сервере</span>
            </div>
          </div>
        </aside>

        <section id="results" class="panel results" hidden>
          <div class="results-head">
            <h2>Доступные варианты</h2>
            <span id="resultCount"></span>
          </div>
          <div id="formatList" class="format-list"></div>
        </section>
      </section>
    </main>

    <script>
      const urlEl = document.getElementById("url");
      const analyzeBtn = document.getElementById("analyzeBtn");
      const statusEl = document.getElementById("status");
      const previewEl = document.getElementById("preview");
      const thumbEl = document.getElementById("thumb");
      const previewStateEl = document.getElementById("previewState");
      const titleEl = document.getElementById("videoTitle");
      const metaEl = document.getElementById("meta");
      const resultsEl = document.getElementById("results");
      const resultCountEl = document.getElementById("resultCount");
      const formatListEl = document.getElementById("formatList");

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle("error", isError);
      }

      function formatDuration(seconds) {
        if (!seconds) return null;
        const mins = Math.floor(seconds / 60);
        const secs = String(seconds % 60).padStart(2, "0");
        return `${mins}:${secs}`;
      }

      function formatSize(bytes) {
        if (!bytes) return "-";
        if (bytes >= 1024 * 1024 * 1024) return `${(bytes / 1024 / 1024 / 1024).toFixed(1)} GB`;
        return `${Math.round(bytes / 1024 / 1024)} MB`;
      }

      function renderPreview(data) {
        previewEl.hidden = false;
        previewStateEl.textContent = "Источник найден";
        titleEl.textContent = data.title || "Видео";
        thumbEl.innerHTML = "";
        if (data.thumbnail) {
          const img = document.createElement("img");
          img.src = data.thumbnail;
          img.alt = "";
          thumbEl.appendChild(img);
        } else {
          thumbEl.textContent = "Видео";
        }
        metaEl.innerHTML = "";
        const duration = formatDuration(data.duration);
        if (duration) addPill(duration);
        addPill(`${data.formats.length} вариантов`);
      }

      function addPill(text) {
        const pill = document.createElement("span");
        pill.className = "pill";
        pill.textContent = text;
        metaEl.appendChild(pill);
      }

      function renderFormats(data, sourceUrl) {
        resultsEl.hidden = false;
        resultCountEl.textContent = data.formats.length ? `${data.formats.length} найдено` : "";
        formatListEl.innerHTML = "";

        if (!data.formats.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "Для этой ссылки нет готового файла с видео и звуком. Без сохранения или склейки на сервере скачать один файл нельзя.";
          formatListEl.appendChild(empty);
          return;
        }

        for (const item of data.formats) {
          const row = document.createElement("div");
          row.className = "format-row";

          const quality = document.createElement("div");
          quality.className = "quality";
          quality.textContent = item.resolution;

          const format = document.createElement("div");
          format.className = "muted";
          format.textContent = item.ext.toUpperCase();

          const size = document.createElement("div");
          size.className = "muted";
          size.textContent = formatSize(item.filesize);

          const link = document.createElement("a");
          link.className = "download-link";
          link.textContent = "Скачать";
          link.href = `/api/stream?${new URLSearchParams({ url: sourceUrl, format_id: item.format_id }).toString()}`;
          link.addEventListener("click", () => {
            setStatus("Скачивание началось. Окно можно не закрывать.");
          });

          row.appendChild(quality);
          row.appendChild(format);
          row.appendChild(size);
          row.appendChild(link);
          formatListEl.appendChild(row);
        }
      }

      async function analyze() {
        const sourceUrl = urlEl.value.trim();
        if (!sourceUrl) {
          setStatus("Вставьте ссылку на видео.", true);
          return;
        }

        analyzeBtn.disabled = true;
        analyzeBtn.textContent = "Ищу...";
        setStatus("Проверяю доступные форматы...");
        resultsEl.hidden = true;
        previewStateEl.textContent = "Проверка ссылки";
        titleEl.textContent = "Читаю доступные варианты";
        thumbEl.innerHTML = "";
        thumbEl.textContent = "Поиск";
        metaEl.innerHTML = "";
        addPill("Анализ");

        try {
          const res = await fetch("/api/formats", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: sourceUrl }),
          });
          const data = await res.json();
          if (!res.ok) {
            setStatus(data.detail || "Не удалось прочитать ссылку.", true);
            return;
          }
          renderPreview(data);
          renderFormats(data, sourceUrl);
          setStatus(data.formats.length ? "Выберите качество для скачивания." : "Готовых прямых файлов не найдено.", !data.formats.length);
        } catch (_error) {
          setStatus("Сервер не ответил. Попробуйте еще раз.", true);
        } finally {
          analyzeBtn.disabled = false;
          analyzeBtn.textContent = "Найти варианты";
        }
      }

      analyzeBtn.addEventListener("click", analyze);
      urlEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter") analyze();
      });
    </script>
  </body>
</html>
